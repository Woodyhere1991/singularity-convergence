<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#c9a84c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="30%" stop-color="#e8d48b"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="100" cy="100" r="90" fill="url(#glow)"/>
  <!-- Orbital rings -->
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.4" transform="rotate(-30, 100, 100)"/>
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.4" transform="rotate(30, 100, 100)"/>
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.4" transform="rotate(90, 100, 100)"/>
  <!-- Convergence lines -->
  <line x1="100" y1="20" x2="100" y2="80" stroke="#c9a84c" stroke-width="0.8" opacity="0.3"/>
  <line x1="100" y1="120" x2="100" y2="180" stroke="#c9a84c" stroke-width="0.8" opacity="0.3"/>
  <line x1="20" y1="100" x2="80" y2="100" stroke="#c9a84c" stroke-width="0.8" opacity="0.3"/>
  <line x1="120" y1="100" x2="180" y2="100" stroke="#c9a84c" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="40" x2="80" y2="80" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <line x1="120" y1="120" x2="160" y2="160" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <line x1="160" y1="40" x2="120" y2="80" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <line x1="80" y1="120" x2="40" y2="160" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <!-- Central singularity point -->
  <circle cx="100" cy="100" r="12" fill="url(#core)" filter="url(#blur)"/>
  <circle cx="100" cy="100" r="6" fill="#fff"/>
  <!-- Small orbital dots -->
  <circle cx="100" cy="30" r="2" fill="#c9a84c" opacity="0.6"/>
  <circle cx="100" cy="170" r="2" fill="#c9a84c" opacity="0.6"/>
  <circle cx="30" cy="100" r="2" fill="#c9a84c" opacity="0.6"/>
  <circle cx="170" cy="100" r="2" fill="#c9a84c" opacity="0.6"/>
  <circle cx="55" cy="55" r="1.5" fill="#c9a84c" opacity="0.4"/>
  <circle cx="145" cy="145" r="1.5" fill="#c9a84c" opacity="0.4"/>
  <circle cx="145" cy="55" r="1.5" fill="#c9a84c" opacity="0.4"/>
  <circle cx="55" cy="145" r="1.5" fill="#c9a84c" opacity="0.4"/>
</svg>
