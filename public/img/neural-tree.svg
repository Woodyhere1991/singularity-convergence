<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Tree of Life / Neural Network hybrid -->
  <!-- Trunk / main pathway -->
  <path d="M 300,380 Q 300,300 300,250 Q 300,200 280,170 Q 260,140 240,120"
        stroke="#c9a84c" fill="none" stroke-width="2" opacity="0.5"/>
  <path d="M 300,380 Q 300,300 300,250 Q 300,200 320,170 Q 340,140 360,120"
        stroke="#c9a84c" fill="none" stroke-width="2" opacity="0.5"/>
  <path d="M 300,250 Q 280,220 250,200 Q 220,180 180,160"
        stroke="#c9a84c" fill="none" stroke-width="1.5" opacity="0.4"/>
  <path d="M 300,250 Q 320,220 350,200 Q 380,180 420,160"
        stroke="#c9a84c" fill="none" stroke-width="1.5" opacity="0.4"/>
  <!-- Upper branches -->
  <path d="M 240,120 Q 220,100 190,80" stroke="#c9a84c" fill="none" stroke-width="1" opacity="0.3"/>
  <path d="M 240,120 Q 230,90 220,60" stroke="#c9a84c" fill="none" stroke-width="1" opacity="0.3"/>
  <path d="M 360,120 Q 380,100 410,80" stroke="#c9a84c" fill="none" stroke-width="1" opacity="0.3"/>
  <path d="M 360,120 Q 370,90 380,60" stroke="#c9a84c" fill="none" stroke-width="1" opacity="0.3"/>
  <path d="M 180,160 Q 150,150 120,140" stroke="#c9a84c" fill="none" stroke-width="1" opacity="0.3"/>
  <path d="M 180,160 Q 160,130 140,100" stroke="#c9a84c" fill="none" stroke-width="1" opacity="0.3"/>
  <path d="M 420,160 Q 450,150 480,140" stroke="#c9a84c" fill="none" stroke-width="1" opacity="0.3"/>
  <path d="M 420,160 Q 440,130 460,100" stroke="#c9a84c" fill="none" stroke-width="1" opacity="0.3"/>
  <!-- Neural connection lines (horizontal) -->
  <line x1="190" y1="80" x2="220" y2="60" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <line x1="410" y1="80" x2="380" y2="60" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <line x1="120" y1="140" x2="140" y2="100" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <line x1="480" y1="140" x2="460" y2="100" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <line x1="240" y1="120" x2="360" y2="120" stroke="#c9a84c" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>
  <line x1="180" y1="160" x2="420" y2="160" stroke="#c9a84c" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>
  <!-- Root system -->
  <path d="M 300,380 Q 280,390 260,395" stroke="#c9a84c" fill="none" stroke-width="1" opacity="0.3"/>
  <path d="M 300,380 Q 320,390 340,395" stroke="#c9a84c" fill="none" stroke-width="1" opacity="0.3"/>
  <path d="M 300,380 Q 300,390 300,400" stroke="#c9a84c" fill="none" stroke-width="1.5" opacity="0.3"/>
  <!-- Nodes (neural/fruit) -->
  <g opacity="0.8">
    <!-- Main trunk nodes -->
    <circle cx="300" cy="380" r="5" fill="#c9a84c"/>
    <circle cx="300" cy="250" r="6" fill="#c9a84c" filter="url(#softGlow)"/>
    <!-- Branch nodes -->
    <circle cx="240" cy="120" r="5" fill="#c9a84c"/>
    <circle cx="360" cy="120" r="5" fill="#c9a84c"/>
    <circle cx="180" cy="160" r="4" fill="#c9a84c"/>
    <circle cx="420" cy="160" r="4" fill="#c9a84c"/>
    <!-- Leaf nodes -->
    <circle cx="190" cy="80" r="3" fill="#e8d48b"/>
    <circle cx="220" cy="60" r="3" fill="#e8d48b"/>
    <circle cx="410" cy="80" r="3" fill="#e8d48b"/>
    <circle cx="380" cy="60" r="3" fill="#e8d48b"/>
    <circle cx="120" cy="140" r="3" fill="#e8d48b"/>
    <circle cx="140" cy="100" r="3" fill="#e8d48b"/>
    <circle cx="480" cy="140" r="3" fill="#e8d48b"/>
    <circle cx="460" cy="100" r="3" fill="#e8d48b"/>
    <!-- Root nodes -->
    <circle cx="260" cy="395" r="2" fill="#c9a84c" opacity="0.5"/>
    <circle cx="340" cy="395" r="2" fill="#c9a84c" opacity="0.5"/>
  </g>
  <!-- Central glow -->
  <circle cx="300" cy="250" r="30" fill="url(#nodeGlow)" opacity="0.3"/>
</svg>
